<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Analyzer</title>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@300;400;700;900&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --card: #1a2235;
            --border: #1e3a5f;
            --accent: #00d4ff;
            --accent2: #7c3aed;
            --green: #10b981;
            --yellow: #f59e0b;
            --red: #ef4444;
            --text: #e2e8f0;
            --muted: #64748b;
            --mono: 'IBM Plex Mono', monospace;
            --sans: 'Tajawal', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 212, 255, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 212, 255, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeDown 0.6s ease;
        }

        .header-badge {
            display: inline-block;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--accent);
            border: 1px solid var(--accent);
            padding: 4px 12px;
            border-radius: 100px;
            margin-bottom: 16px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        h1 {
            font-size: clamp(28px, 5vw, 52px);
            font-weight: 900;
            line-height: 1.1;
            background: linear-gradient(135deg, #fff 30%, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--muted);
            font-size: 15px;
            font-weight: 300;
        }

        .lang-switch {
            text-align: center;
            margin: 20px 0 -10px;
        }

        .lang-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--muted);
            padding: 6px 16px;
            margin-bottom: 33px;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--sans);
        }

        .lang-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .search-wrap {
            display: flex;
            gap: 12px;
            max-width: 560px;
            margin: 0 auto 48px;
            animation: fadeUp 0.6s ease 0.2s both;
        }

        .search-input {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 15px;
            padding: 14px 20px;
            border-radius: 12px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            direction: ltr;
            text-align: left;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(0, 212, 255, 0.1);
        }

        .search-input::placeholder {
            color: var(--muted);
        }

        .btn {
            padding: 14px 28px;
            border-radius: 12px;
            font-family: var(--sans);
            font-size: 15px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: #fff;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-export {
            background: var(--card);
            border: 1px solid var(--green);
            color: var(--green);
        }

        .btn-export:hover {
            background: rgba(16, 185, 129, 0.1);
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            display: none;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        .loading-text {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--muted);
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--red);
            border-radius: 12px;
            padding: 16px 20px;
            color: var(--red);
            font-size: 14px;
            margin-bottom: 24px;
            display: none;
            text-align: center;
        }

        .profile-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 28px;
            display: flex;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
            animation: fadeUp 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .profile-card::before {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(0, 212, 255, 0.08), transparent 70%);
            pointer-events: none;
        }

        .avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            flex-shrink: 0;
        }

        .profile-info h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .profile-info .login {
            font-family: var(--mono);
            font-size: 13px;
            color: var(--accent);
            margin-bottom: 8px;
            direction: ltr;
            display: inline-block;
        }

        .profile-info .bio {
            font-size: 14px;
            color: var(--muted);
        }

        .profile-stats {
            display: flex;
            gap: 24px;
            margin-right: auto;
            flex-shrink: 0;
        }

        .stat {
            text-align: center;
        }

        .stat-num {
            font-family: var(--mono);
            font-size: 22px;
            font-weight: 600;
            color: var(--accent);
            display: block;
        }

        .stat-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .summary-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .summary-item {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 20px;
            animation: fadeUp 0.4s ease;
        }

        .summary-item .s-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 8px;
        }

        .summary-item .s-val {
            font-family: var(--mono);
            font-size: 28px;
            font-weight: 600;
            color: var(--text);
        }

        .summary-item .s-sub {
            font-size: 12px;
            color: var(--muted);
            margin-top: 4px;
        }

        .lang-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 32px;
            animation: fadeUp 0.4s ease;
        }

        .section-title {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::before {
            content: '';
            width: 3px;
            height: 16px;
            background: var(--accent);
            border-radius: 2px;
            display: inline-block;
        }

        .lang-bar-wrap {
            display: flex;
            height: 10px;
            border-radius: 100px;
            overflow: hidden;
            margin-bottom: 16px;
            gap: 2px;
        }

        .lang-bar-seg {
            height: 100%;
            border-radius: 100px;
            transition: flex 0.6s ease;
        }

        .lang-legend {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 24px;
        }

        .lang-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .lang-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .lang-pct {
            font-family: var(--mono);
            font-size: 12px;
            color: var(--muted);
        }

        .repos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .repo-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            animation: fadeUp 0.4s ease;
            transition: border-color 0.2s, transform 0.2s;
            position: relative;
            overflow: hidden;
        }

        .repo-card:hover {
            border-color: rgba(0, 212, 255, 0.4);
            transform: translateY(-3px);
        }

        .repo-card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.03), transparent);
            pointer-events: none;
        }

        .repo-name {
            font-family: var(--mono);
            font-size: 15px;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 6px;
            word-break: break-all;
            direction: ltr;
            text-align: left;
        }

        .repo-desc {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.6;
            margin-bottom: 14px;
            min-height: 40px;
        }

        .repo-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin-bottom: 14px;
        }

        .tag {
            font-family: var(--mono);
            font-size: 11px;
            padding: 3px 10px;
            border-radius: 100px;
            border: 1px solid;
        }

        .tag-lang {
            border-color: var(--accent2);
            color: var(--accent2);
            background: rgba(124, 58, 237, 0.08);
        }

        .tag-topic {
            border-color: var(--border);
            color: var(--muted);
        }

        .repo-meta {
            display: flex;
            align-items: center;
            gap: 16px;
            font-size: 12px;
            color: var(--muted);
            font-family: var(--mono);
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .repo-updated {
            margin-right: auto;
            font-size: 11px;
            direction: ltr;
        }

        .export-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 16px;
            animation: fadeUp 0.4s ease;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .arabic-num {
            font-feature-settings: "ss02";
        }

        @media (max-width: 600px) {
            .profile-stats {
                display: none;
            }

            .repos-grid {
                grid-template-columns: 1fr;
            }

            .search-wrap {
                flex-direction: column;
            }
        }

        .site-footer {
            margin-top: 60px;
            padding: 24px 0 12px;
            text-align: center;
            border-top: 1px solid var(--border);
            color: var(--muted);
            font-size: 14px;
            animation: fadeUp 0.6s ease;
        }

        .footer-content {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px 16px;
        }

        .footer-label {
            color: var(--accent);
            font-weight: 500;
        }

        .footer-link {
            font-family: var(--mono);
            color: var(--accent);
            text-decoration: none;
            border-bottom: 1px dotted var(--accent2);
            transition: color 0.2s, border-color 0.2s;
        }

        .footer-link:hover {
            color: #fff;
            border-bottom-color: #fff;
        }

        .footer-divider {
            color: var(--border);
            font-weight: 300;
        }

        html[dir="ltr"] .footer-label::after {
            content: "Repository";
        }

        html[dir="rtl"] .footer-label::after {
            content: "المستودع";
        }
    </style>
</head>

<body>
    <div class="container">

        <div class="header">
            <div class="header-badge">⚡ GitHub Analyzer</div>
            <h1>تحليل مشاريع GitHub</h1>
            <p class="subtitle">أدخل اسم المستخدم واحصل على تقرير شامل لجميع مشاريعك</p>
        </div>

        <div class="lang-switch">
            <button class="lang-btn" id="toggleLangBtn" onclick="toggleLanguage()">🌐 English / العربية</button>
        </div>


        <div class="search-wrap">
            <input class="search-input" id="usernameInput" type="text" placeholder="GitHub username..."
                value="Alawim0" />
            <button class="btn btn-primary" id="analyzeBtn" onclick="analyze()">تحليل</button>
        </div>
        <div style="max-width:560px;margin:-32px auto 48px;animation:fadeUp 0.6s ease 0.3s both;">
            <div style="display:flex;align-items:center;gap:10px;margin-bottom:8px;">
                <div style="flex:1;height:1px;background:var(--border)"></div>
                <span style="font-size:12px;color:var(--muted);white-space:nowrap">حساب خاص؟ أضف التوكن</span>
                <div style="flex:1;height:1px;background:var(--border)"></div>
            </div>
            <div style="display:flex;gap:10px;align-items:center;">
                <input class="search-input" id="tokenInput" type="password" placeholder="ghp_xxxxxxxxxxxx  (اختياري)"
                    style="flex:1;font-size:13px;padding:10px 16px;" />
                <a href="https://github.com/settings/tokens/new?scopes=repo&description=GitHub+Analyzer" target="_blank"
                    style="font-size:12px;color:var(--accent);white-space:nowrap;text-decoration:none;opacity:0.8;">احصل
                    على توكن ↗</a>
            </div>
            <div style="font-size:11px;color:var(--muted);margin-top:6px;padding-right:4px;">
                🔒 التوكن يُستخدم مباشرة في متصفحك فقط ولا يُرسل لأي خادم
            </div>
        </div>

        <div class="error-box" id="errorBox"></div>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div class="loading-text" id="loadingText">جارٍ جلب البيانات...</div>
        </div>

        <div id="results" style="display:none">
            <div class="profile-card" id="profileCard"></div>
            <div class="summary-bar" id="summaryBar"></div>
            <div class="lang-section" id="langSection"></div>
            <div class="repos-grid" id="reposGrid"></div>
            <div class="export-bar">
                <button class="btn btn-export" onclick="exportMD()">⬇ تصدير تقرير Markdown</button>
            </div>

            <footer class="site-footer">
                <div class="footer-content">
                    <span>🔗 <span class="footer-label">:</span></span>
                    <a href="https://github.com/alawim0/github-analyzer" target="_blank" class="footer-link">
                        github.com/alawim0/github-analyzer
                    </a>
                    <span class="footer-divider">|</span>
                    <span>⚡ مبني بواسطة <strong>@alawim0</strong></span>
                </div>
            </footer>
        </div>
    </div>

    <script>
        const LANG_COLORS = {
            'JavaScript': '#f7df1e', 'TypeScript': '#3178c6', 'Python': '#3572a5',
            'Java': '#b07219', 'C++': '#f34b7d', 'C#': '#178600', 'Go': '#00add8',
            'Rust': '#dea584', 'HTML': '#e34c26', 'CSS': '#563d7c', 'Dart': '#00b4ab',
            'Swift': '#f05138', 'Kotlin': '#a97bff', 'PHP': '#4f5d95', 'Ruby': '#701516',
            'Vue': '#42b883', 'Shell': '#89e051', 'Jupyter Notebook': '#da5b0b',
            'C': '#555555', 'SCSS': '#c6538c', 'Svelte': '#ff3e00', 'R': '#198ce7'
        };

        let allRepos = [];
        let userData = {};

        async function analyze() {
            const username = document.getElementById('usernameInput').value.trim();
            const token = document.getElementById('tokenInput').value.trim();
            if (!username) return;

            const headers = token ? { 'Authorization': `token ${token}` } : {};

            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;
            document.getElementById('results').style.display = 'none';
            document.getElementById('errorBox').style.display = 'none';
            document.getElementById('loading').style.display = 'block';
            setLoading('جارٍ جلب بيانات المستخدم...');

            try {
                const userRes = await fetch(`https://api.github.com/users/${username}`, { headers });
                if (!userRes.ok) throw new Error(userRes.status === 404 ? 'المستخدم غير موجود' : userRes.status === 401 ? 'التوكن غير صحيح' : 'خطأ في جلب البيانات');
                userData = await userRes.json();

                setLoading('جارٍ جلب المستودعات...');
                let repos = [];
                let page = 1;
                while (true) {
                    const endpoint = token
                        ? `https://api.github.com/user/repos?per_page=100&page=${page}&sort=updated&affiliation=owner`
                        : `https://api.github.com/users/${username}/repos?per_page=100&page=${page}&sort=updated`;
                    const r = await fetch(endpoint, { headers });
                    const data = await r.json();
                    if (!Array.isArray(data) || !data.length) break;
                    repos = repos.concat(data);
                    if (data.length < 100) break;
                    page++;
                }

                allRepos = repos;
                setLoading('جارٍ تحليل البيانات...');
                renderAll();
                document.getElementById('loading').style.display = 'none';
                document.getElementById('results').style.display = 'block';
            } catch (e) {
                document.getElementById('loading').style.display = 'none';
                const err = document.getElementById('errorBox');
                err.textContent = '⚠ ' + e.message;
                err.style.display = 'block';
            }
            btn.disabled = false;
        }

        function setLoading(txt) {
            document.getElementById('loadingText').textContent = txt;
        }

        function renderAll() {
            renderProfile();
            renderSummary();
            renderLangs();
            renderRepos();
        }

        function renderProfile() {
            const u = userData;
            document.getElementById('profileCard').innerHTML = `
    <img class="avatar" src="${u.avatar_url}" alt="avatar" />
    <div class="profile-info">
      <h2>${u.name || u.login}</h2>
      <div class="login">@${u.login}</div>
      ${u.bio ? `<div class="bio">${u.bio}</div>` : ''}
    </div>
    <div class="profile-stats">
      <div class="stat"><span class="stat-num">${u.public_repos}</span><span class="stat-label">مستودع</span></div>
      <div class="stat"><span class="stat-num">${u.followers}</span><span class="stat-label">متابع</span></div>
      <div class="stat"><span class="stat-num">${u.following}</span><span class="stat-label">يتابع</span></div>
    </div>
  `;
        }

        function renderSummary() {
            const repos = allRepos;
            const stars = repos.reduce((s, r) => s + r.stargazers_count, 0);
            const forks = repos.reduce((s, r) => s + r.forks_count, 0);
            const langs = [...new Set(repos.map(r => r.language).filter(Boolean))];
            const withDesc = repos.filter(r => r.description).length;

            document.getElementById('summaryBar').innerHTML = `
    <div class="summary-item"><div class="s-label">المستودعات</div><div class="s-val">${repos.length}</div><div class="s-sub">إجمالي المشاريع</div></div>
    <div class="summary-item"><div class="s-label">النجوم</div><div class="s-val">${stars}</div><div class="s-sub">إجمالي النجوم</div></div>
    <div class="summary-item"><div class="s-label">التفرعات</div><div class="s-val">${forks}</div><div class="s-sub">إجمالي الـ Forks</div></div>
    <div class="summary-item"><div class="s-label">اللغات</div><div class="s-val">${langs.length}</div><div class="s-sub">لغة برمجية مختلفة</div></div>
    <div class="summary-item"><div class="s-label">موثقة</div><div class="s-val">${withDesc}</div><div class="s-sub">مشروع مع وصف</div></div>
  `;
        }

        function renderLangs() {
            const repos = allRepos.filter(r => r.language);
            const counts = {};
            repos.forEach(r => { counts[r.language] = (counts[r.language] || 0) + 1; });
            const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1]);
            const total = sorted.reduce((s, [, n]) => s + n, 0);

            const bars = sorted.map(([lang, n]) => {
                const pct = ((n / total) * 100).toFixed(1);
                const color = LANG_COLORS[lang] || '#64748b';
                return `<div class="lang-bar-seg" style="flex:${pct};background:${color}"></div>`;
            }).join('');

            const legend = sorted.slice(0, 10).map(([lang, n]) => {
                const pct = ((n / total) * 100).toFixed(1);
                const color = LANG_COLORS[lang] || '#64748b';
                return `<div class="lang-item"><div class="lang-dot" style="background:${color}"></div>${lang}<span class="lang-pct">${pct}%</span></div>`;
            }).join('');

            document.getElementById('langSection').innerHTML = `
    <div class="section-title">توزيع اللغات البرمجية</div>
    <div class="lang-bar-wrap">${bars}</div>
    <div class="lang-legend">${legend}</div>
  `;
        }

        function renderRepos() {
            const grid = document.getElementById('reposGrid');
            grid.innerHTML = `<div class="section-title" style="grid-column:1/-1;margin-bottom:0">المستودعات (${allRepos.length})</div>`;

            allRepos.forEach((repo, i) => {
                const card = document.createElement('div');
                card.className = 'repo-card';
                card.style.animationDelay = `${Math.min(i, 20) * 0.04}s`;

                const langTag = repo.language ? `<span class="tag tag-lang">${repo.language}</span>` : '';
                const topicTags = (repo.topics || []).slice(0, 3).map(t => `<span class="tag tag-topic">${t}</span>`).join('');
                const updated = new Date(repo.updated_at).toLocaleDateString('ar-EG-u-nu-arab', { year: 'numeric', month: 'numeric', day: 'numeric' });
                const isForked = repo.fork ? '🍴' : '';
                const isPrivate = repo.private ? '🔒' : '🌐';

                card.innerHTML = `
      <div class="repo-name">${isForked}${isPrivate} ${repo.name}</div>
      <div class="repo-desc">${repo.description || '<span style="color:var(--border)">لا يوجد وصف</span>'}</div>
      <div class="repo-tags">${langTag}${topicTags}</div>
      <div class="repo-meta">
        <span class="meta-item">⭐ ${repo.stargazers_count}</span>
        <span class="meta-item">🍴 ${repo.forks_count}</span>
        <span class="meta-item">👀 ${repo.watchers_count}</span>
        <span class="repo-updated">🕒 ${updated}</span>
      </div>
    `;
                grid.appendChild(card);
            });
        }

        function exportMD() {
            const u = userData;
            const repos = allRepos;

            const langs = {};
            repos.filter(r => r.language).forEach(r => { langs[r.language] = (langs[r.language] || 0) + 1; });
            const sortedLangs = Object.entries(langs).sort((a, b) => b[1] - a[1]);
            const total = sortedLangs.reduce((s, [, n]) => s + n, 0);

            const stars = repos.reduce((s, r) => s + r.stargazers_count, 0);
            const forks = repos.reduce((s, r) => s + r.forks_count, 0);

            let md = `# تقرير GitHub | @${u.login}\n\n`;
            md += `> تم إنشاء هذا التقرير بتاريخ ${new Date().toLocaleDateString('ar-EG-u-nu-arab')}\n\n`;
            md += `---\n\n## 👤 معلومات المستخدم\n\n`;
            md += `| المعلومة | القيمة |\n|---|---|\n`;
            md += `| الاسم | ${u.name || u.login} |\n`;
            md += `| المعرّف | @${u.login} |\n`;
            if (u.bio) md += `| السيرة | ${u.bio} |\n`;
            if (u.company) md += `| الشركة | ${u.company} |\n`;
            if (u.location) md += `| الموقع | ${u.location} |\n`;
            if (u.blog) md += `| الموقع الإلكتروني | ${u.blog} |\n`;
            md += `| تاريخ الانضمام | ${new Date(u.created_at).toLocaleDateString('ar-EG-u-nu-arab')} |\n`;
            md += `\n---\n\n## 📊 إحصائيات عامة\n\n`;
            md += `| الإحصائية | القيمة |\n|---|---|\n`;
            md += `| إجمالي المستودعات | ${repos.length} |\n`;
            md += `| إجمالي النجوم | ${stars} |\n`;
            md += `| إجمالي التفرعات | ${forks} |\n`;
            md += `| المتابعون | ${u.followers} |\n`;
            md += `| اللغات المستخدمة | ${sortedLangs.length} |\n`;
            md += `\n---\n\n## 💻 اللغات البرمجية\n\n`;
            md += `| اللغة | عدد المستودعات | النسبة |\n|---|---|---|\n`;
            sortedLangs.forEach(([lang, n]) => {
                md += `| ${lang} | ${n} | ${((n / total) * 100).toFixed(1)}% |\n`;
            });
            md += `\n---\n\n## 📁 المستودعات\n\n`;
            repos.forEach((r, i) => {
                const updated = new Date(r.updated_at).toLocaleDateString('ar-EG-u-nu-arab');
                md += `### ${i + 1}. ${r.name}\n\n`;
                md += `- **الوصف:** ${r.description || 'لا يوجد وصف'}\n`;
                md += `- **اللغة:** ${r.language || 'غير محدد'}\n`;
                md += `- **النجوم:** ${r.stargazers_count} | **التفرعات:** ${r.forks_count}\n`;
                md += `- **آخر تحديث:** ${updated}\n`;
                md += `- **الرابط:** ${r.html_url}\n`;
                if (r.topics && r.topics.length) md += `- **المواضيع:** ${r.topics.join(', ')}\n`;
                if (r.homepage) md += `- **الموقع:** ${r.homepage}\n`;
                md += `\n`;
            });

            const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = `github-report-${u.login}.md`;
            a.click();
        }

        function toggleLanguage() {
            const html = document.documentElement;
            const currentDir = html.getAttribute('dir');
            const newDir = currentDir === 'rtl' ? 'ltr' : 'rtl';

            html.setAttribute('dir', newDir);
            html.setAttribute('lang', newDir === 'rtl' ? 'ar' : 'en');

            const btn = document.getElementById('toggleLangBtn');

            if (newDir === 'rtl') {
                btn.textContent = '🌐 English';
                document.querySelector('h1').innerHTML = 'محلل مشاريع GitHub';
                document.querySelector('.subtitle').innerHTML = 'أدخل اسم المستخدم واحصل على تقرير شامل لجميع مشاريعك';
                document.getElementById('analyzeBtn').textContent = 'تحليل';
                document.querySelector('.export-bar .btn').innerHTML = '⬇ تصدير تقرير Markdown';
            } else {
                btn.textContent = '🌐 العربية';
                document.querySelector('h1').innerHTML = 'GitHub Projects Analyzer';
                document.querySelector('.subtitle').innerHTML = 'Enter a username to get a comprehensive report of all projects';
                document.getElementById('analyzeBtn').textContent = 'Analyze';
                document.querySelector('.export-bar .btn').innerHTML = '⬇ Export Markdown Report';
            }
        }

        window.onload = () => analyze();
    </script>
</body>

</html>
